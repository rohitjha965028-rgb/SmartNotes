<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Notes - Modern Productivity Tool</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Decorative background elements for Glassmorphism -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
        </div>
        <h1>Smart Notes</h1>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <div class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
        <input type="text" id="search-input" placeholder="Search notes..." autocomplete="off">
        <button id="clear-search" class="clear-search-btn" aria-label="Clear search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- Actions Bar -->
      <div class="header-actions">
        <!-- Theme Toggle -->
        <button id="theme-toggle" class="icon-btn" title="Toggle Theme" aria-label="Toggle light or dark theme">
          <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>

        <!-- Import / Export Buttons -->
        <button id="export-btn" class="icon-btn" title="Export Notes (JSON)" aria-label="Export notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </button>
        <button id="import-btn" class="icon-btn" title="Import Notes (JSON)" aria-label="Import notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
        <input type="file" id="import-file" accept=".json" style="display: none;">

        <!-- New Note Button -->
        <button id="new-note-header-btn" class="primary-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>New Note</span>
        </button>
      </div>
    </header>

    <!-- Toolbar: Filters & Sorting -->
    <section class="app-toolbar">
      <!-- Category Tabs (Filter) -->
      <div class="category-filters" id="category-filters">
        <button class="filter-tab active" data-category="all">All Notes</button>
        <button class="filter-tab" data-category="personal">Personal</button>
        <button class="filter-tab" data-category="work">Work</button>
        <button class="filter-tab" data-category="ideas">Ideas</button>
        <button class="filter-tab" data-category="todo">To-Do</button>
        <button class="filter-tab" data-category="journal">Journal</button>
      </div>

      <!-- Sorting Options -->
      <div class="sort-container">
        <label for="sort-select">Sort by:</label>
        <div class="select-wrapper">
          <select id="sort-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="alphabetical">Title (A-Z)</option>
            <option value="pinned">Pinned First</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </div>
      </div>
    </section>

    <!-- Main Content Area -->
    <main class="app-main">
      <!-- Notes Grid -->
      <div id="notes-grid" class="notes-grid">
        <!-- Cards generated dynamically -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-illustration">
          <!-- Stylized Notebook SVG -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            <line x1="9" y1="6" x2="15" y2="6"></line>
            <line x1="9" y1="10" x2="15" y2="10"></line>
            <line x1="9" y1="14" x2="15" y2="14"></line>
          </svg>
        </div>
        <h2>Your thoughts are empty</h2>
        <p>Create a note to capture your thoughts, ideas, or to-do lists.</p>
        <button id="empty-state-btn" class="primary-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span>Create First Note</span>
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>Press <kbd>Ctrl</kbd> + <kbd>N</kbd> to write a note. <span class="divider">|</span> Smart Notes &copy; 2026</p>
    </footer>
  </div>

  <!-- Note Editor Modal -->
  <div id="note-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card">
      <div class="modal-header">
        <input type="text" id="modal-note-title" placeholder="Title" autocomplete="off" class="modal-title-input">
        <div class="modal-header-actions">
          <button id="modal-pin-btn" class="modal-pin-btn" title="Pin Note" aria-label="Pin note">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="17" x2="12" y2="22"></line>
              <path d="M5 17h14v-1.76a2 2 0 0 0-.44-1.24l-2.78-3.5A2 2 0 0 1 15 9.26V5a2 2 0 0 0-2-2h-2a2 2 0 0 0-2 2v4.26a2 2 0 0 1-.78 1.24l-2.78 3.5A2 2 0 0 0 5 15.24V17z"></path>
            </svg>
          </button>
          <button id="modal-close-btn" class="modal-close-btn" title="Close modal" aria-label="Close modal">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="modal-body">
        <textarea id="modal-note-content" placeholder="Take a note..."></textarea>
      </div>

      <div class="modal-footer">
        <div class="footer-left">
          <!-- Category Selector -->
          <div class="category-dropdown-wrapper">
            <select id="modal-note-category" class="category-select">
              <option value="personal">Personal</option>
              <option value="work">Work</option>
              <option value="ideas">Ideas</option>
              <option value="todo">To-Do</option>
              <option value="journal">Journal</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <!-- Save Status Indicator -->
          <span id="save-status" class="save-status">Saved</span>
        </div>
        
        <div class="footer-right">
          <!-- Character Count -->
          <span id="char-counter" class="char-counter">0 characters</span>
          <button id="modal-save-btn" class="primary-btn">Save Note</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal-card confirm-card">
      <div class="confirm-body">
        <div class="confirm-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </div>
        <h3 id="confirm-title">Delete this note?</h3>
        <p>This action is permanent and cannot be undone. Are you sure?</p>
      </div>
      <div class="confirm-footer">
        <button id="confirm-cancel-btn" class="secondary-btn">Cancel</button>
        <button id="confirm-delete-btn" class="danger-btn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <!-- Floating Action Button for Mobile -->
  <button id="fab-btn" class="fab-btn" title="Create New Note" aria-label="Create note">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
